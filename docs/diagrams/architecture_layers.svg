<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1021"/>
      <stop offset="1" stop-color="#1A1F3A"/>
    </linearGradient>
    <linearGradient id="presentation" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5B8CFF"/>
      <stop offset="1" stop-color="#8FB1FF"/>
    </linearGradient>
    <linearGradient id="domain" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#30C78F"/>
      <stop offset="1" stop-color="#6FE3B9"/>
    </linearGradient>
    <linearGradient id="data" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF8A5B"/>
      <stop offset="1" stop-color="#FFB38F"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#9D7BFF"/>
      <stop offset="1" stop-color="#C5B2FF"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#E9ECFF"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #F6F8FF; }
      .subtitle { font: 500 16px Arial, sans-serif; fill: #C6CBE8; }
      .layerTitle { font: 700 24px Arial, sans-serif; fill: #0E1122; }
      .layerText { font: 500 16px Arial, sans-serif; fill: #10142A; }
      .note { font: 600 15px Arial, sans-serif; fill: #E9ECFF; }
      .chip { font: 600 13px Arial, sans-serif; fill: #0E1122; }
    </style>
  </defs>

  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>

  <text x="60" y="74" class="title">Clean Architecture Layers</text>
  <text x="60" y="102" class="subtitle">Presentation -&gt; Domain &lt;- Data, with shared Core infrastructure</text>

  <rect x="70" y="150" width="300" height="170" rx="18" fill="url(#presentation)"/>
  <text x="90" y="194" class="layerTitle">Presentation</text>
  <text x="90" y="226" class="layerText">Pages, Controllers, Widgets</text>
  <text x="90" y="252" class="layerText">Route Bindings, UI State</text>

  <rect x="450" y="150" width="300" height="170" rx="18" fill="url(#domain)"/>
  <text x="470" y="194" class="layerTitle">Domain</text>
  <text x="470" y="226" class="layerText">UseCases, Entities</text>
  <text x="470" y="252" class="layerText">Repository Contracts</text>

  <rect x="830" y="150" width="300" height="170" rx="18" fill="url(#data)"/>
  <text x="850" y="194" class="layerTitle">Data</text>
  <text x="850" y="226" class="layerText">Repository Implementations</text>
  <text x="850" y="252" class="layerText">ML / Native / Storage Services</text>

  <rect x="260" y="370" width="680" height="120" rx="18" fill="url(#core)"/>
  <text x="286" y="415" class="layerTitle">Core</text>
  <text x="286" y="445" class="layerText">Theme, Routes, Shared Widgets, Cross-feature Infra</text>

  <line x1="370" y1="235" x2="450" y2="235" stroke="#E9ECFF" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="830" y1="255" x2="750" y2="255" stroke="#E9ECFF" stroke-width="4" marker-end="url(#arrow)"/>

  <line x1="220" y1="320" x2="340" y2="370" stroke="#D6DBFF" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="980" y1="320" x2="860" y2="370" stroke="#FFDCCF" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="64" y="490" width="302" height="40" rx="10" fill="#EAF0FF"/>
  <text x="78" y="515" class="chip">Rule: Presentation does not import Data directly</text>

  <rect x="420" y="490" width="355" height="40" rx="10" fill="#D9F8EC"/>
  <text x="436" y="515" class="chip">Rule: Domain stays framework/platform independent</text>

  <rect x="822" y="490" width="304" height="40" rx="10" fill="#FFE7DE"/>
  <text x="838" y="515" class="chip">Rule: Data depends on Domain contracts</text>
</svg>
