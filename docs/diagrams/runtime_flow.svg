  <line x1="320" y1="326" x2="278" y2="326" stroke="#F2F5FF" stroke-width="3" marker-end="url(#arr)"/>

  <rect x="1120" y="286" width="230" height="82" rx="12" fill="#FFE7DE"/>
  <text x="1138" y="315" class="k">Storage</text>
  <text x="1138" y="340" class="n">Files + Hive metadata</text>
