name: imageflow
description: "Intelligent image processing - auto-detects content type and applies appropriate processing pipeline."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.7.3

  # ML Kit
  google_mlkit_face_detection: ^0.13.2
  google_mlkit_text_recognition: ^0.15.1

  # Camera & Image Picker
  camera: ^0.11.4
  image_picker: ^1.2.1
  permission_handler: ^12.0.1

  # Image Processing
  image: ^4.5.4

  # PDF Generation
  pdf: ^3.11.3

  # Local Database
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

  # File Storage
  path_provider: ^2.1.5

  # Utilities
  uuid: ^4.5.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Mocking
  mocktail: ^1.0.4

  # Hive Code Generation
  hive_ce_generator: ^1.11.1
  build_runner: ^2.11.1

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
